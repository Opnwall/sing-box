name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: "00 23 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
      - "**/template.json"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.check.outputs.new }}
      version: ${{ steps.check.outputs.version }}

    steps:
      # 获取最新版本
      - name: Get latest sing-box version
        run: |
          latest_version=$(curl -sSL https://api.github.com/repos/Sagernet/sing-box/releases/latest | jq -r '.tag_name' | sed 's|v||g')
          echo "VERSION=${latest_version}" >> $GITHUB_ENV
          echo "RELEASE_NAME=${latest_version}-vincent" >> $GITHUB_ENV
          echo "TAG_NAME=v${latest_version}-vincent" >> $GITHUB_ENV
          echo "TAGS=with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale" >> $GITHUB_ENV

      # 读取 hidden 分支版本记录
      - name: Checkout repository (for version check)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Try switch to hidden branch
        run: |
          if git show-ref --verify --quiet refs/heads/hidden; then
            git checkout hidden
          else
            echo "hidden branch does not exist yet"
          fi

      - name: Check for new version
        id: check
        run: |
          if [ -f last_version ]; then
            LAST_VERSION=$(cat last_version)
          else
            LAST_VERSION="none"
          fi

          if [ "${VERSION}" != "${LAST_VERSION}" ]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # 仅当有新版本时执行
      - name: Checkout source
        if: steps.check.outputs.new == 'true'
        uses: actions/checkout@v6

      # 克隆 sing-box 读取 go.mod
      - name: Clone sing-box source
        if: steps.check.outputs.new == 'true'
        run: |
          git clone --depth 1 -b main https://github.com/Sagernet/sing-box.git sing-box

      # 🔥 自动检测 Go 版本
      - name: Detect required Go version
        if: steps.check.outputs.new == 'true'
        id: goversion
        run: |
          GO_VERSION=$(grep "^go " sing-box/go.mod | awk '{print $2}')
          echo "Detected Go version: $GO_VERSION"
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go automatically
        if: steps.check.outputs.new == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.goversion.outputs.go_version }}

      - name: Cache go modules
        if: steps.check.outputs.new == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}

      # 克隆依赖 + 打补丁
      - name: Apply patches
        if: steps.check.outputs.new == 'true'
        run: |
          git clone --depth 1 -b main https://github.com/Sagernet/sing-tun.git sing-tun
          git clone --depth 1 https://github.com/metacubex/tfo-go.git tfo-go

          cd sing-tun
          patch -p1 < ../sing-tun.patch || true

          cd ../sing-box
          patch -p1 < ../sing-box.patch || true

          sing_tun_version=$(grep github.com/sagernet/sing-tun go.mod | awk '{ print $2 }')
          echo "replace github.com/sagernet/sing-tun ${sing_tun_version} => ../sing-tun" >> go.mod

          tfo_go_version=$(grep github.com/metacubex/tfo-go go.mod | awk '{ print $2 }')
          echo "replace github.com/metacubex/tfo-go ${tfo_go_version} => ../tfo-go" >> go.mod

          # Ensure module dependencies are consistent
          go mod tidy

      # 构建
      - name: Build
        if: steps.check.outputs.new == 'true'
        run: |
          cd sing-box
          # Make sure modules are clean before build
          go mod tidy

          GOOS=freebsd GOARCH=amd64 CGO_ENABLED=0 \
          go build -trimpath -mod=mod \
          -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${RELEASE_NAME}' -s -w -buildid=" \
          -tags ${TAGS} ./cmd/sing-box

          mv sing-box sing-box-freebsd-amd64
          xz sing-box-freebsd-amd64

          mkdir -p ../publish
          mv sing-box-freebsd-amd64.xz ../publish/

      - name: Release
        if: steps.check.outputs.new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          overwrite: true
          files: ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.new == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure branch exists
        run: git checkout -B hidden

      - name: Update version record
        run: echo "${{ needs.build.outputs.version }}" > last_version

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version
          git commit -m "Release ${{ needs.build.outputs.version }}" || echo "No change"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git hidden --force
